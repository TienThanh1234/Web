{% extends "base.html" %}

{% block title %}
Home
{% endblock %}

{% block content %}

<!-- Màn hình Home đầu tiên -->
<div class="uma-home">

    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>
    <div class="decor-circle circle-3"></div>

    <div class="speed-line line-1"></div>
    <div class="speed-line line-2"></div>
    <div class="speed-line line-3"></div>

    <div class="main-text">
        <h1>WELCOME, NƠI TÔI SẼ CHỈ CHO BẠN TẤT CẢ NHỮNG GÌ VỀ GAME UMAMUSUME</h1>
        <p>Thanh's Uma Website</p>
    </div>

</div>

<!-- Phần Database khi kéo xuống -->
<section class="database-section">

    <h2>Database</h2>

    <div class="database-grid">

        <a href="{{ url_for('characters') }}" class="database-card">
            <div class="card-icon">
                <img src="{{ url_for('static', filename='images/characters.png') }}" alt="Characters">
            </div>
            <h3>Characters</h3>
        </a>

        <a href="{{ url_for('support_card') }}" class="database-card">
            <div class="card-icon">
                <img src="{{ url_for('static', filename='images/support_card.png') }}" alt="Support Card">
            </div>
            <h3>Support Card</h3>
        </a>

        <a href="{{ url_for('banner_history') }}" class="database-card">
            <div class="card-icon same-icon">
                <img src="{{ url_for('static', filename='images/banner_history.png') }}" alt="Banner History">
            </div>
            <h3>Banner History</h3>
        </a>

        <a href="{{ url_for('tier_list') }}" class="database-card">
            <div class="card-icon same-icon">
                <img src="{{ url_for('static', filename='images/tier_list.png') }}" alt="Tier List">
            </div>
            <h3>Tier List</h3>
        </a>

        <a href="{{ url_for('cm_guide') }}" class="database-card">
            <div class="card-icon same-icon">
                <img src="{{ url_for('static', filename='images/cm_guide.png') }}" alt="CM Guide">
            </div>
            <h3>CM Guide</h3>
        </a>

        <a href="{{ url_for('scenario_guide') }}" class="database-card">
            <div class="card-icon same-icon">
                <img src="{{ url_for('static', filename='images/scenario_guide.png') }}" alt="Scenario Guide">
            </div>
            <h3>Scenario Guide</h3>
        </a>

    </div>

</section>

<style>
    .content-wrapper {
        padding: 0 !important;
    }

    html {
        scroll-behavior: smooth;
    }

    /* ================= HOME HERO ================= */

    .uma-home {
        width: 100%;
        height: calc(100vh - 72px);

        position: relative;
        overflow: hidden;

        display: flex;
        justify-content: center;
        align-items: center;

        background:
            radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.85), transparent 18%),
            radial-gradient(circle at 85% 15%, rgba(255, 236, 90, 0.9), transparent 22%),
            radial-gradient(circle at 20% 85%, rgba(74, 219, 255, 0.85), transparent 26%),
            radial-gradient(circle at 80% 80%, rgba(255, 105, 190, 0.8), transparent 25%),
            linear-gradient(135deg, #ff7ac8 0%, #8f7cff 35%, #53ddff 65%, #fff06a 100%);
    }

    .uma-home::before {
        content: "";
        position: absolute;
        inset: 0;

        background-image:
            linear-gradient(120deg, rgba(255, 255, 255, 0.25) 0 3px, transparent 3px 90px),
            linear-gradient(60deg, rgba(255, 255, 255, 0.18) 0 3px, transparent 3px 80px);

        opacity: 0.8;
    }

    .uma-home::after {
        content: "";
        position: absolute;
        inset: 0;

        background:
            linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.38) 45%,
                transparent 70%
            );

        transform: skewX(-20deg) translateX(-130%);
        animation: lightSweep 4s infinite;
    }

    .main-text {
        position: relative;
        z-index: 5;

        width: 88%;
        max-width: 1250px;

        text-align: center;
    }

    .main-text h1 {
        margin: 0;

        font-size: 46px;
        font-weight: 900;
        line-height: 1.25;
        letter-spacing: 1px;

        color: #ffffff;

        text-shadow:
            3px 3px 0 #ff4fa3,
            6px 6px 0 #6747d6,
            0 0 18px rgba(0, 0, 0, 0.35),
            0 0 35px rgba(255, 255, 255, 0.65);
    }

    .main-text p {
        margin-top: 22px;
        margin-bottom: 0;

        font-size: 28px;
        font-weight: 800;

        color: #fff66d;

        text-shadow:
            2px 2px 0 #ff4fa3,
            4px 4px 0 #6747d6,
            0 0 12px rgba(0, 0, 0, 0.35);
    }

    .decor-circle {
        position: absolute;
        border-radius: 50%;
        z-index: 2;
        opacity: 0.65;
        filter: blur(1px);
        animation: floatCircle 5s ease-in-out infinite alternate;
    }

    .circle-1 {
        width: 180px;
        height: 180px;
        top: 12%;
        left: 8%;
        background: rgba(255, 255, 255, 0.35);
    }

    .circle-2 {
        width: 130px;
        height: 130px;
        right: 10%;
        top: 20%;
        background: rgba(255, 255, 255, 0.3);
        animation-delay: 1s;
    }

    .circle-3 {
        width: 220px;
        height: 220px;
        right: 18%;
        bottom: 8%;
        background: rgba(255, 255, 255, 0.22);
        animation-delay: 2s;
    }

    .speed-line {
        position: absolute;
        width: 150%;
        height: 10px;
        left: -25%;

        background: rgba(255, 255, 255, 0.45);
        border-radius: 999px;

        transform: rotate(-12deg);
        z-index: 3;
    }

    .line-1 {
        top: 26%;
    }

    .line-2 {
        top: 52%;
        opacity: 0.35;
    }

    .line-3 {
        top: 78%;
        opacity: 0.25;
    }

    /* ================= DATABASE SECTION ================= */

    .database-section {
        min-height: 100vh;
        padding: 50px 80px 70px;

        background:
            radial-gradient(circle at 10% 10%, rgba(255, 122, 200, 0.25), transparent 22%),
            radial-gradient(circle at 90% 20%, rgba(83, 221, 255, 0.28), transparent 25%),
            linear-gradient(135deg, #f8fbff 0%, #f1efff 45%, #fff4fb 100%);
    }

    .database-section h2 {
        font-size: 38px;
        font-weight: 900;
        margin-bottom: 28px;

        color: #2f2b68;
    }

    .database-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
    }

    .database-card {
        min-height: 230px;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background: rgba(255, 255, 255, 0.9);
        border-radius: 22px;
        border: 3px solid rgba(255, 255, 255, 0.95);

        text-decoration: none;

        box-shadow:
            0 10px 25px rgba(90, 73, 145, 0.16),
            inset 0 0 20px rgba(255, 255, 255, 0.5);

        transition: 0.25s;
    }

    .database-card:hover {
        text-decoration: none;
        transform: translateY(-8px) scale(1.03);

        box-shadow:
            0 18px 35px rgba(255, 79, 163, 0.28),
            inset 0 0 22px rgba(255, 255, 255, 0.65);
    }

    .card-icon {
        width: 170px;
        height: 130px;

        display: flex;
        justify-content: center;
        align-items: center;

        margin-bottom: 18px;

        border-radius: 20px;

        background: linear-gradient(135deg, #f4f1ff, #e8f8ff);
        border: 3px solid #ffffff;

        overflow: hidden;

        box-shadow:
            inset 0 0 18px rgba(255, 255, 255, 0.8),
            0 6px 15px rgba(90, 73, 145, 0.12);
    }

    .same-icon {
        background: linear-gradient(135deg, #eef3ff, #f7efff);
    }

    .card-icon img {
        width: 100%;
        height: 100%;

        object-fit: contain;
        padding: 14px;

        background: transparent;
    }

    .database-card h3 {
        margin: 0;

        font-size: 24px;
        font-weight: 800;

        color: #2f2b68;
        text-align: center;
    }

    .database-card:hover h3 {
        color: #ff4fa3;
    }

    @keyframes lightSweep {
        0% {
            transform: skewX(-20deg) translateX(-130%);
        }

        45% {
            transform: skewX(-20deg) translateX(130%);
        }

        100% {
            transform: skewX(-20deg) translateX(130%);
        }
    }

    @keyframes floatCircle {
        from {
            transform: translateY(0) scale(1);
        }

        to {
            transform: translateY(-25px) scale(1.08);
        }
    }

    @media (max-width: 1000px) {
        .database-grid {
            grid-template-columns: repeat(2, 1fr);
        }

        .main-text h1 {
            font-size: 34px;
        }
    }

    @media (max-width: 650px) {
        .database-section {
            padding: 35px 22px;
        }

        .database-grid {
            grid-template-columns: 1fr;
        }

        .main-text h1 {
            font-size: 28px;
        }

        .main-text p {
            font-size: 22px;
        }
    }
</style>

{% endblock %}
