{% extends "base.html" %}

{% block title %}Login | Thanh's Uma Website{% endblock %}

{% block content %}

<style>
    .login-page {
        min-height: calc(100vh - 135px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px 15px;

        background:
            linear-gradient(
                rgba(255, 255, 255, 0.82),
                rgba(255, 255, 255, 0.92)
            ),
            linear-gradient(
                135deg,
                #ffe4f1 0%,
                #fff5bd 50%,
                #e8e5ff 100%
            );
    }

    .login-card {
        width: 100%;
        max-width: 440px;
        background-color: #ffffff;
        border-radius: 18px;
        padding: 38px 35px;
        border: 1px solid #f3d7e6;
        box-shadow: 0 14px 35px rgba(240, 108, 169, 0.2);
    }

    .login-logo {
        text-align: center;
        margin-bottom: 28px;
    }

    .login-logo-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 15px;
        border-radius: 50%;

        display: flex;
        justify-content: center;
        align-items: center;

        font-size: 30px;
        color: #ffffff;

        background: linear-gradient(
            135deg,
            #ffca42,
            #f06ca9,
            #7479ff
        );

        box-shadow: 0 7px 16px rgba(240, 108, 169, 0.3);
    }

    .login-title {
        margin-bottom: 6px;
        color: #111111;
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .login-description {
        margin-bottom: 0;
        color: #777777;
        font-size: 14px;
    }

    .login-form .form-group {
        margin-bottom: 20px;
    }

    .login-form label {
        margin-bottom: 8px;
        color: #222222;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        top: 50%;
        left: 16px;
        color: #f06ca9;
        transform: translateY(-50%);
    }

    .login-form .form-control {
        height: 50px;
        padding-left: 46px;
        border: 1px solid #dddddd;
        border-radius: 10px;
        font-size: 15px;
    }

    .login-form .form-control:focus {
        border-color: #f06ca9;
        box-shadow: 0 0 0 3px rgba(240, 108, 169, 0.15);
    }

    .login-button {
        width: 100%;
        height: 50px;
        margin-top: 7px;
        border: none;
        border-radius: 10px;

        color: #ffffff;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 1.5px;
        text-transform: uppercase;

        background: linear-gradient(
            90deg,
            #f06ca9,
            #dd67c8,
            #7479ff
        );

        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-button:hover {
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 8px 17px rgba(240, 108, 169, 0.3);
    }

    .login-alert {
        margin-bottom: 22px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
    }

    @media (max-width: 576px) {
        .login-card {
            padding: 30px 22px;
        }

        .login-title {
            font-size: 25px;
        }
    }
</style>

<div class="login-page">
    <div class="login-card">

        <div class="login-logo">
            <div class="login-logo-icon">
                <i class="fa-solid fa-horse-head"></i>
            </div>

            <h1 class="login-title">Welcome Back</h1>

            <p class="login-description">
                Login to Thanh's Uma Website
            </p>
        </div>

        {% if error %}
            <div class="alert alert-danger login-alert">
                <i class="fa-solid fa-circle-exclamation mr-2"></i>
                {{ error }}
            </div>
        {% endif %}

        <form class="login-form" method="POST" action="{{ url_for('login') }}">

            <div class="form-group">
                <label for="username">Username</label>

                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>

                    <input
                        id="username"
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>

                    <input
                        id="password"
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        autocomplete="current-password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn login-button">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>
                Login
            </button>

        </form>
    </div>
</div>

{% endblock %}
