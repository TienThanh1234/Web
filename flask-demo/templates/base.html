<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Thanh's Uma Website{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
        }

        /* Navbar chính */
        .custom-navbar {
            min-height: 72px;
            background-color: white;
            padding: 0 35px;
            border-bottom: 1px solid #eeeeee;
            display: flex;
            align-items: center;
        }

        /* Logo kiểu Uma Musume */
        .uma-logo {
            font-size: 28px;
            font-weight: 900;
            font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif;
            font-style: italic;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            white-space: nowrap;
            margin-right: 35px;

            background: linear-gradient(
                180deg,
                #fff36a 0%,
                #ffca42 25%,
                #ff7a7a 60%,
                #df62c9 100%
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1.4px #ffffff;

            text-shadow:
                2px 2px 0 #f06ca9,
                -2px 2px 0 #f06ca9,
                2px -2px 0 #f06ca9,
                -2px -2px 0 #f06ca9,
                4px 4px 0 #6a71ff;

            transform: skewX(-10deg);
            display: inline-block;
        }

        .uma-logo:hover {
            text-decoration: none;
            transform: skewX(-10deg) scale(1.03);
        }

        /* Menu giữa */
        .navbar-nav {
            align-items: center;
        }

        .custom-navbar .nav-link {
            color: #111111 !important;
            font-size: 16px;
            font-weight: 800;
            padding: 25px 16px !important;
            letter-spacing: 1.5px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .custom-navbar .nav-link:hover {
            color: #f06ca9 !important;
        }

        /* Database dropdown */
        .database-dropdown {
            position: relative;
        }

        .dropdown-arrow {
            font-size: 10px;
            margin-left: 6px;
        }

        .database-menu {
            display: none;
            position: absolute;
            top: 68px;
            left: 0;
            min-width: 240px;
            background-color: white;
            border: 1px solid #eeeeee;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
            z-index: 9999;
        }

        .database-menu a {
            display: block;
            padding: 13px 18px;
            color: #111111;
            text-decoration: none;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .database-menu a:hover {
            background-color: #ffe6f2;
            color: #f06ca9;
        }

        .database-dropdown:hover .database-menu {
            display: block;
        }

        /* Icons bên phải */
        .right-icons {
            display: flex;
            align-items: center;
            gap: 17px;
            margin-left: auto;
        }

        .right-icons a {
            color: #111111;
            font-size: 17px;
            text-decoration: none;
        }

        .right-icons a:hover {
            color: #f06ca9;
        }

        .navbar-toggler {
            border: none;
            outline: none;
            margin-left: auto;
        }

        .navbar-toggler:focus {
            outline: none;
        }

        .content-wrapper {
            padding: 30px 40px;
        }

        /* Responsive cho màn hình nhỏ */
        @media (max-width: 991px) {
            .custom-navbar {
                height: auto;
                padding: 12px 20px;
            }

            .uma-logo {
                font-size: 24px;
                margin-right: 0;
            }

            .custom-navbar .nav-link {
                padding: 10px 0 !important;
            }

            .database-menu {
                position: static;
                display: none;
                box-shadow: none;
                border: none;
                padding-left: 15px;
            }

            .database-dropdown:hover .database-menu {
                display: block;
            }

            .database-menu a {
                padding: 10px 0;
                font-size: 14px;
            }

            .right-icons {
                margin-top: 12px;
                margin-left: 0;
                padding-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar">

        <!-- Logo -->
        <a class="uma-logo" href="{{ url_for('home') }}">
            Thanh's Uma Website
        </a>

        <!-- Nút menu khi màn hình nhỏ -->
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fa-solid fa-bars"></i>
        </button>

        <!-- Phần menu có thể collapse -->
        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">
                        HOME
                    </a>
                </li>

                <li class="nav-item database-dropdown">
                    <a class="nav-link" href="#">
                        DATABASE <span class="dropdown-arrow">▼</span>
                    </a>

                    <div class="database-menu">
                        <a href="{{ url_for('characters') }}">Characters</a>
                        <a href="{{ url_for('support_card') }}">Support Card</a>
                        <a href="{{ url_for('banner_history') }}">Banner History</a>
                        <a href="{{ url_for('tier_list') }}">Tier List</a>
                        <a href="{{ url_for('cm_guide') }}">CM Guide</a>
                        <a href="{{ url_for('scenario_guide') }}">Scenario Guide</a>
                        <a href="{{ url_for('skills') }}">Skills</a>
                    </div>
                </li>

            </ul>

            <!-- Icon bên phải -->
            <div class="right-icons">
                <a href="#"><i class="fa-regular fa-envelope"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            </div>

        </div>
    </nav>

    <!-- Nội dung từng trang -->
    <div class="content-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
